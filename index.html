<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Case-Study | Human Factor Refresher Training</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: linear-gradient(135deg, #0a2a3a 0%, #0d1b2a 50%, #1b263b 100%);
    color: #e0e1dd;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
  }
  
  /* Subtle background pattern */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 10% 20%, rgba(69, 179, 255, 0.05) 1%, transparent 1%);
    background-size: 40px 40px;
    pointer-events: none;
  }
  
  .join-container {
    max-width: 540px;
    width: 100%;
    position: relative;
    z-index: 1;
  }
  
  /* Logo / Title Section */
  .logo { text-align: center; margin-bottom: 1.5rem; }
  .logo h1 { 
    font-family: 'Bebas Neue', sans-serif; 
    font-size: 3.5rem; 
    background: linear-gradient(135deg, #ffffff 0%, #45b3ff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 0.05em;
    text-shadow: 0 2px 10px rgba(69, 179, 255, 0.2);
  }
  .logo .subtitle { 
    font-family: 'IBM Plex Mono', monospace; 
    font-size: 0.65rem; 
    color: #ffd166; 
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: -0.25rem;
  }
  .logo .training-badge {
    display: inline-block;
    background: rgba(255, 209, 102, 0.1);
    border: 1px solid rgba(255, 209, 102, 0.3);
    border-radius: 20px;
    padding: 0.2rem 1rem;
    font-size: 0.6rem;
    color: #ffd166;
    margin-top: 0.5rem;
  }
  
  /* Main Card - Glass morphism */
  .card {
    background: rgba(27, 38, 59, 0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(69, 179, 255, 0.2);
    border-radius: 28px;
    padding: 2rem;
    box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(69, 179, 255, 0.1) inset;
  }
  
  .card h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: #ffffff;
    margin-bottom: 0.25rem;
  }
  
  .card-sub {
    font-size: 0.7rem;
    color: #7b8a9b;
    margin-bottom: 1.5rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid rgba(69, 179, 255, 0.2);
  }
  
  /* Session Code */
  .session-code {
    background: rgba(27, 38, 59, 0.8);
    border: 1px solid rgba(69, 179, 255, 0.3);
    border-radius: 16px;
    padding: 0.8rem 1rem;
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .session-code-label { 
    font-size: 0.55rem; 
    color: #7b8a9b; 
    letter-spacing: 0.15em; 
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
  }
  .session-code-value { 
    font-family: 'IBM Plex Mono', monospace; 
    font-size: 1.1rem; 
    font-weight: 600; 
    color: #45b3ff; 
    letter-spacing: 0.05em;
    background: rgba(0,0,0,0.3);
    display: inline-block;
    padding: 0.2rem 0.8rem;
    border-radius: 8px;
    margin-top: 0.25rem;
  }
  
  /* Form */
  .input-group { margin-bottom: 1.5rem; }
  .input-group label {
    display: block;
    font-size: 0.7rem;
    font-weight: 600;
    color: #ffd166;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .input-group select {
    width: 100%;
    padding: 1rem;
    background: rgba(13, 27, 42, 0.8);
    border: 1px solid rgba(69, 179, 255, 0.3);
    border-radius: 14px;
    color: #e0e1dd;
    font-size: 0.95rem;
    font-family: 'IBM Plex Sans', sans-serif;
    outline: none;
    transition: all 0.2s;
    cursor: pointer;
  }
  .input-group select:hover { 
    border-color: #45b3ff; 
    background: rgba(13, 27, 42, 1);
  }
  .input-group select:focus { 
    border-color: #ffd166; 
    box-shadow: 0 0 0 3px rgba(255, 209, 102, 0.2);
  }
  
  /* Role Badge */
  .role-badge {
    display: inline-block;
    font-size: 0.6rem;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    font-weight: 600;
    margin-left: 0.5rem;
  }
  .role-participant { background: rgba(69, 179, 255, 0.15); color: #45b3ff; border: 1px solid rgba(69,179,255,0.3); }
  .role-observer { background: rgba(255, 209, 102, 0.15); color: #ffd166; border: 1px solid rgba(255,209,102,0.3); }
  
  /* Button - Push to Start */
  .btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.12em;
    padding: 1rem;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
  }
  .btn-primary {
    background: linear-gradient(135deg, #45b3ff 0%, #1a6bc3 100%);
    color: white;
    box-shadow: 0 6px 0 #0d3b5e;
    transform: translateY(-2px);
  }
  .btn-primary:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 0 #0d3b5e;
  }
  .btn-primary:active {
    transform: translateY(2px);
    box-shadow: 0 3px 0 #0d3b5e;
  }
  .btn-icon {
    font-size: 1.4rem;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
  }
  
  /* Participants Section */
  .participants-section { margin-top: 1.5rem; }
  .participants-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #7b8a9b;
    margin-bottom: 0.75rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .participants-list {
    max-height: 220px;
    overflow-y: auto;
    border-radius: 16px;
    background: rgba(13, 27, 42, 0.5);
  }
  .participant-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.7rem 1rem;
    border-bottom: 1px solid rgba(69, 179, 255, 0.1);
    font-size: 0.85rem;
  }
  .participant-item:last-child { border-bottom: none; }
  .participant-name { font-weight: 500; color: #ffffff; }
  .participant-status { font-size: 0.7rem; color: #45b3ff; }
  
  /* Footer */
  .footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.6rem;
    color: #5a6e84;
  }
  .footer a { color: #5a6e84; text-decoration: none; transition: color 0.2s; }
  .footer a:hover { color: #ffd166; }
  
  /* Scrollbar */
  .participants-list::-webkit-scrollbar { width: 4px; }
  .participants-list::-webkit-scrollbar-track { background: #1b263b; border-radius: 10px; }
  .participants-list::-webkit-scrollbar-thumb { background: #45b3ff; border-radius: 10px; }
  
  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card { animation: fadeInUp 0.5s ease; }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  .btn-icon {
    animation: pulse 1.5s infinite;
  }
  
  /* Empty state message styling */
  .empty-message {
    text-align: center;
    padding: 1rem;
    color: #5a6e84;
    font-style: italic;
    font-size: 0.8rem;
  }
</style>
</head>
<body>
<div class="join-container">
  <div class="logo">
    <h1>CASE-STUDY</h1>
    <div class="subtitle">Human Factor Refresher Training</div>
    <div class="training-badge">✈️ Sita Air Ltd | 29 May 2026</div>
  </div>
  
  <div class="card">
    <div class="session-code">
      <div class="session-code-label">SESSION CODE</div>
      <div class="session-code-value" id="session-code">HF-SAL-R29052026</div>
    </div>
    
    <div class="input-group">
      <label>✏️ SELECT YOUR NAME</label>
      <select id="player-select">
        <option value="">-- Choose your name --</option>
      </select>
    </div>
    
    <button class="btn btn-primary" onclick="joinGame()">
      <span class="btn-icon">▶</span>
      PUSH TO START
      <span class="btn-icon">▶</span>
    </button>
    
    <div class="participants-section">
      <div class="participants-title">
        <span>👥 PARTICIPANTS</span>
        <span id="participant-count">0 joined</span>
      </div>
      <div class="participants-list" id="participants-list">
        <div class="empty-message">Waiting for participants to join...</div>
      </div>
    </div>
  </div>
  
  <div class="footer">
  <a href="facilitator-login.html">🔐 FACILITATOR LOGIN</a> • 
  <span id="online-status">🟢 Online</span> • 
  HF-SAL-R29052026
</div>
</div>

<script>
// ============================================
// PRE-DEFINED PARTICIPANTS
// ============================================
const PARTICIPANTS_LIST = [
  { name: "Akash Sunder Pradhan", role: "participant", email: "akash@sitaair.com" },
  { name: "Shambhu Kaji Dotel", role: "participant", email: "shambhu@sitaair.com" },
  { name: "Mohan Nakarmi", role: "participant", email: "mohan@sitaair.com" },
  { name: "Dipesh Prasad Chalise", role: "participant", email: "dipesh@sitaair.com" },
  { name: "Prakash Choudhary", role: "participant", email: "prakash@sitaair.com" },
  { name: "Shailendra Singh", role: "participant", email: "shailendra@sitaair.com" },
  { name: "Dipendra Karki", role: "participant", email: "dipendra@sitaair.com" },
  { name: "Satish Choudhary", role: "participant", email: "satish@sitaair.com" },
  { name: "Bhusan Devkota", role: "observer", email: "bhusan@caan.gov.np" },
  { name: "CAAN Representative", role: "observer", email: "caan@caan.gov.np" }
];

// Session code - Fixed as per your requirement
const SESSION_CODE = "HF-SAL-R29052026";
localStorage.setItem('hf-session-id', SESSION_CODE);
document.getElementById('session-code').textContent = SESSION_CODE;

// Load existing participants
let joinedParticipants = JSON.parse(localStorage.getItem('hf-participants') || '[]');

// Populate dropdown with available participants (not already joined)
function populateDropdown() {
  const select = document.getElementById('player-select');
  const joinedNames = joinedParticipants.map(p => p.name);
  const available = PARTICIPANTS_LIST.filter(p => !joinedNames.includes(p.name));
  
  select.innerHTML = '<option value="">-- Choose your name --</option>';
  available.forEach(p => {
    const option = document.createElement('option');
    option.value = JSON.stringify(p);
    option.textContent = p.name;
    if (p.role === 'observer') {
      option.textContent += ' (Observer)';
    }
    select.appendChild(option);
  });
  
  if (available.length === 0) {
    select.innerHTML = '<option value="">-- All participants have joined --</option>';
    select.disabled = true;
  } else {
    select.disabled = false;
  }
}

// Render participants list in UI
function renderParticipants() {
  const container = document.getElementById('participants-list');
  const count = document.getElementById('participant-count');
  
  if (joinedParticipants.length === 0) {
    container.innerHTML = '<div class="empty-message">⏳ Waiting for participants to join...</div>';
    count.textContent = '0 joined';
    return;
  }
  
  count.textContent = `${joinedParticipants.length} / ${PARTICIPANTS_LIST.length} joined`;
  
  container.innerHTML = joinedParticipants.map(p => `
    <div class="participant-item">
      <div>
        <span class="participant-name">👤 ${escapeHtml(p.name)}</span>
        <span class="role-badge ${p.role === 'observer' ? 'role-observer' : 'role-participant'}">${p.role === 'observer' ? '👁️ Observer' : '📚 Participant'}</span>
      </div>
      <span class="participant-status">✓ Joined</span>
    </div>
  `).join('');
}

// Join game function
function joinGame() {
  const select = document.getElementById('player-select');
  const selectedValue = select.value;
  
  if (!selectedValue) {
    alert('Please select your name from the list');
    return;
  }
  
  const playerData = JSON.parse(selectedValue);
  
  // Check if already joined
  if (joinedParticipants.some(p => p.name === playerData.name)) {
    alert(`${playerData.name} has already joined. Please contact the facilitator if this is an error.`);
    return;
  }
  
  // Create participant object
  const newParticipant = {
    id: Date.now().toString(),
    name: playerData.name,
    email: playerData.email,
    role: playerData.role,
    score: 0,
    joinedAt: new Date().toISOString()
  };
  
  joinedParticipants.push(newParticipant);
  localStorage.setItem('hf-participants', JSON.stringify(joinedParticipants));
  localStorage.setItem('hf-current-player', JSON.stringify(newParticipant));
  
  // Redirect to case study page
  window.location.href = 'casestudy.html';
}

// Utility function
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// Online status
function updateOnlineStatus() {
  const statusEl = document.getElementById('online-status');
  if (navigator.onLine) {
    statusEl.innerHTML = '🟢 Online';
    statusEl.style.color = '#45b3ff';
  } else {
    statusEl.innerHTML = '🔴 Offline';
    statusEl.style.color = '#ffd166';
  }
}

// Initialize and auto-refresh
populateDropdown();
renderParticipants();
updateOnlineStatus();

// Refresh participants list periodically (for facilitator updates)
setInterval(() => {
  joinedParticipants = JSON.parse(localStorage.getItem('hf-participants') || '[]');
  populateDropdown();
  renderParticipants();
}, 3000);

window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
</script>
</body>
</html>
