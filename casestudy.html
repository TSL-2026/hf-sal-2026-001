<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case-Study | Human Factor Refresher Training</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: linear-gradient(135deg, #0a2a3a 0%, #0d1b2a 50%, #1b263b 100%);
    color: #e0e1dd;
    min-height: 100vh;
  }
  
  .header {
    background: rgba(13, 27, 42, 0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(69, 179, 255, 0.2);
    padding: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  
  .logo h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    background: linear-gradient(135deg, #ffffff 0%, #45b3ff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  
  .player-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    color: #ffd166;
  }
  
  .player-score {
    font-size: 0.7rem;
    color: #7b8a9b;
  }
  
  .score-bar {
    display: flex;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    overflow-x: auto;
    border-bottom: 1px solid rgba(69, 179, 255, 0.2);
  }
  
  .score-chip {
    font-family: monospace;
    font-size: 0.65rem;
    padding: 0.25rem 0.6rem;
    background: rgba(27, 38, 59, 0.6);
    border: 1px solid rgba(69, 179, 255, 0.2);
    border-radius: 20px;
    white-space: nowrap;
  }
  
  .score-chip.active {
    border-color: #ffd166;
    background: rgba(255, 209, 102, 0.1);
    color: #ffd166;
  }
  
  .tabs {
    display: flex;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    border-bottom: 1px solid rgba(69, 179, 255, 0.2);
  }
  
  .tab {
    background: none;
    border: none;
    color: #7b8a9b;
    padding: 0.4rem 1rem;
    cursor: pointer;
    font-family: monospace;
    font-size: 0.7rem;
    border-radius: 4px;
  }
  
  .tab.active {
    background: rgba(27, 38, 59, 0.6);
    color: #45b3ff;
  }
  
  .scenario-panel {
    background: rgba(27, 38, 59, 0.6);
    backdrop-filter: blur(10px);
    margin: 1rem;
    padding: 1.5rem;
    border-radius: 20px;
    border-left: 3px solid #45b3ff;
  }
  
  .scenario-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
  }
  
  .scenario-text {
    font-size: 0.85rem;
    line-height: 1.6;
    color: #7b8a9b;
  }
  
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1rem;
    padding: 1rem;
  }
  
  .card {
    aspect-ratio: 2/3;
    background: linear-gradient(145deg, #1b263b, #0d1b2a);
    border: 1px solid rgba(69, 179, 255, 0.2);
    border-radius: 16px;
    padding: 1rem;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    position: relative;
    transition: all 0.2s;
  }
  
  .card:hover:not(.used) {
    transform: translateY(-4px);
    border-color: #45b3ff;
  }
  
  .card.used {
    opacity: 0.3;
    cursor: not-allowed;
  }
  
  .card.used::after {
    content: "✓ ANSWERED";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-15deg);
    font-size: 0.6rem;
    background: rgba(0,0,0,0.7);
    padding: 0.2rem 0.5rem;
    border-radius: 20px;
    white-space: nowrap;
  }
  
  .card-category {
    font-size: 0.5rem;
    font-family: monospace;
    color: #7b8a9b;
    text-transform: uppercase;
  }
  
  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    color: #ffffff;
    margin: 0.5rem 0;
  }
  
  .card-points {
    font-size: 0.7rem;
    color: #ffd166;
    margin-top: auto;
    text-align: right;
  }
  
  .framework-grid {
    display: grid;
    gap: 0.75rem;
    padding: 1rem;
  }
  
  .framework-item {
    background: rgba(27, 38, 59, 0.6);
    border: 1px solid rgba(69, 179, 255, 0.2);
    border-radius: 12px;
    padding: 1rem;
  }
  
  .framework-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    margin-bottom: 0.3rem;
  }
  
  .framework-desc {
    font-size: 0.7rem;
    color: #7b8a9b;
    line-height: 1.5;
  }
  
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.95);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  
  .modal-overlay.open {
    display: flex;
  }
  
  .modal {
    background: #1b263b;
    border: 1px solid rgba(69, 179, 255, 0.3);
    border-radius: 24px;
    max-width: 500px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
  }
  
  .modal-header {
    padding: 1rem;
    border-bottom: 1px solid rgba(69, 179, 255, 0.2);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    color: #45b3ff;
  }
  
  .modal-body {
    padding: 1rem;
  }
  
  .modal-question {
    background: #0d1b2a;
    padding: 1rem;
    border-radius: 12px;
    margin-bottom: 1rem;
    font-size: 0.9rem;
    line-height: 1.6;
  }
  
  .modal-hint {
    font-size: 0.75rem;
    color: #7b8a9b;
    margin-bottom: 1rem;
    padding: 0.5rem;
    border-left: 2px solid #ffd166;
  }
  
  .answer-input {
    width: 100%;
    background: #0d1b2a;
    border: 1px solid rgba(69, 179, 255, 0.3);
    border-radius: 12px;
    color: #e0e1dd;
    padding: 0.8rem;
    min-height: 100px;
    outline: none;
  }
  
  .answer-input:focus {
    border-color: #45b3ff;
  }
  
  .modal-actions {
    display: flex;
    gap: 0.5rem;
    margin-top: 1rem;
  }
  
  .btn-submit {
    background: linear-gradient(135deg, #45b3ff, #1a6bc3);
    color: white;
    border: none;
    padding: 0.6rem;
    border-radius: 12px;
    cursor: pointer;
    flex: 1;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
  }
  
  .btn-cancel {
    background: transparent;
    border: 1px solid rgba(69, 179, 255, 0.3);
    color: #7b8a9b;
    padding: 0.6rem;
    border-radius: 12px;
    cursor: pointer;
  }
  
  .waiting-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
  }
  
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(69, 179, 255, 0.2);
    border-top-color: #45b3ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 1rem;
  }
  
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  
  .log-entry {
    background: rgba(27, 38, 59, 0.6);
    border: 1px solid rgba(69, 179, 255, 0.2);
    border-radius: 12px;
    margin-bottom: 0.5rem;
  }
  
  .log-header {
    display: flex;
    justify-content: space-between;
    padding: 0.75rem;
    cursor: pointer;
  }
  
  .log-body {
    padding: 0.75rem;
    display: none;
    font-size: 0.75rem;
    border-top: 1px solid rgba(69, 179, 255, 0.2);
    background: rgba(13, 27, 42, 0.5);
    border-radius: 0 0 12px 12px;
  }
  
  .log-body.open {
    display: block;
  }
  
  .hidden {
    display: none;
  }
  
  .exit-btn {
    background: transparent;
    border: 1px solid #7b8a9b;
    color: #7b8a9b;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.7rem;
    margin-top: 0.3rem;
  }
  
  .exit-btn:hover {
    border-color: #ffd166;
    color: #ffd166;
  }
  
  .refresh-note {
    text-align: center;
    padding: 0.5rem;
    font-size: 0.7rem;
    color: #ffd166;
    background: rgba(255, 209, 102, 0.1);
    border-bottom: 1px solid rgba(255, 209, 102, 0.2);
  }
</style>
</head>
<body>
<div id="waiting-screen" class="waiting-screen">
  <div>
    <div class="spinner"></div>
    <h3>Waiting for Facilitator</h3>
    <p style="color: #7b8a9b; margin-top: 0.5rem;">Please wait for the session to start</p>
    <p style="color: #ffd166; font-size: 0.7rem; margin-top: 1rem;">🔄 Auto-refreshing every 5 seconds...</p>
  </div>
</div>

<div id="case-container" class="hidden">
  <div class="refresh-note" id="refresh-note">
    🔄 Session active! Refresh page if cards don't appear.
  </div>
  
  <div class="header">
    <div class="logo">
      <h2>CASE-STUDY</h2>
    </div>
    <div>
      <div class="player-name" id="player-name">Loading...</div>
      <div class="player-score" id="player-score">Score: 0</div>
      <button class="exit-btn" onclick="exitGame()">✕ Exit</button>
    </div>
  </div>
  
  <div class="score-bar" id="score-bar"></div>
  
  <div class="tabs">
    <button class="tab active" onclick="switchTab('scenario', this)">📖 Case Scenario</button>
    <button class="tab" onclick="switchTab('cards', this)">🎴 Case Cards</button>
    <button class="tab" onclick="switchTab('frameworks', this)">📚 Frameworks</button>
    <button class="tab" onclick="switchTab('log', this)">📋 My Answers</button>
  </div>
  
  <div id="scenario-tab" class="scenario-panel"></div>
  <div id="cards-tab" class="cards-grid hidden"></div>
  <div id="frameworks-tab" class="framework-grid hidden"></div>
  <div id="log-tab" style="padding: 1rem;" class="hidden"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header" id="modal-title">Case Card</div>
    <div class="modal-body">
      <div class="modal-question" id="modal-question"></div>
      <div class="modal-hint" id="modal-hint"></div>
      <textarea class="answer-input" id="answer" placeholder="Type your answer here..."></textarea>
      <div class="modal-actions">
        <button class="btn-submit" onclick="submitAnswer()">Submit Answer</button>
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script>
let player = null;
let caseData = null;
let cards = [];
let answers = [];
let allPlayers = [];
let activeCard = null;

// Auto-refresh to detect session start
let checkInterval = null;

function loadPlayer() {
  const saved = localStorage.getItem('hf-current-player');
  if (!saved) {
    window.location.href = 'index.html';
    return;
  }
  player = JSON.parse(saved);
  document.getElementById('player-name').textContent = player.name;
  updateScore();
}

function updateScore() {
  document.getElementById('player-score').textContent = `Score: ${player.score || 0}`;
}

function checkForActiveCase() {
  const activeCase = localStorage.getItem('hf-active-case');
  
  if (activeCase && !caseData) {
    // Session just started!
    console.log('Session detected! Loading case...');
    caseData = JSON.parse(activeCase);
    loadCaseData();
  } else if (!activeCase && caseData) {
    // Session ended
    console.log('Session ended');
    caseData = null;
    document.getElementById('waiting-screen').classList.remove('hidden');
    document.getElementById('case-container').classList.add('hidden');
  }
}

function loadCaseData() {
  if (!caseData) return;
  
  document.getElementById('waiting-screen').classList.add('hidden');
  document.getElementById('case-container').classList.remove('hidden');
  
  const saved = localStorage.getItem(`progress-${player.id}`);
  if (saved) {
    const p = JSON.parse(saved);
    cards = caseData.cards.map(c => ({ ...c, used: p.used?.includes(c.title) || false }));
    answers = p.answers || [];
  } else {
    cards = caseData.cards.map(c => ({ ...c, used: false }));
    answers = [];
  }
  
  renderScenario();
  renderScoreBar();
  renderCards();
  renderFrameworks();
  renderLog();
}

function renderScenario() {
  const container = document.getElementById('scenario-tab');
  container.innerHTML = `
    <div class="scenario-title">📖 ${escapeHtml(caseData.title)} (${caseData.year})</div>
    <div class="scenario-text">${escapeHtml(caseData.scenario)}</div>
  `;
}

function renderScoreBar() {
  allPlayers = JSON.parse(localStorage.getItem('hf-participants') || '[]');
  const container = document.getElementById('score-bar');
  if (allPlayers.length === 0) {
    container.innerHTML = '<div class="score-chip">Waiting for participants...</div>';
    return;
  }
  container.innerHTML = allPlayers.map(p => `
    <div class="score-chip ${p.id === player.id ? 'active' : ''}">
      ${escapeHtml(p.name)}: ${p.score} pts
    </div>
  `).join('');
}

function renderCards() {
  const container = document.getElementById('cards-tab');
  if (!cards.length) {
    container.innerHTML = '<p style="text-align:center; padding:2rem; color:#7b8a9b;">No cards available.</p>';
    return;
  }
  container.innerHTML = cards.map((c, i) => `
    <div class="card ${c.used ? 'used' : ''}" onclick="${!c.used ? `openCard(${i})` : ''}">
      <div class="card-category">${escapeHtml(c.category)}</div>
      <div class="card-title">${escapeHtml(c.title)}</div>
      <div class="card-points">${c.points} pts</div>
      <div style="font-size:0.6rem; color:#7b8a9b; margin-top:0.5rem;">${c.used ? '✓ Answered' : 'Tap to answer'}</div>
    </div>
  `).join('');
}

function renderFrameworks() {
  const frameworks = [
    { name: "Dirty Dozen", desc: "12 human factors: Communication, Complacency, Knowledge, Distraction, Teamwork, Fatigue, Resources, Pressure, Assertiveness, Stress, Awareness, Norms." },
    { name: "Swiss Cheese", desc: "Accidents occur when holes in multiple defensive layers align simultaneously." },
    { name: "Dekker", desc: "Human error is a symptom, not a cause. People act rationally given their local context." },
    { name: "Conklin", desc: "Work-as-imagined ≠ work-as-done. Find gaps before accidents." },
    { name: "Hollnagel", desc: "Study why work usually succeeds. Accidents emerge from normal variability." },
    { name: "Edmondson", desc: "Teams perform best when members can speak up without fear." }
  ];
  const container = document.getElementById('frameworks-tab');
  container.innerHTML = frameworks.map(f => `
    <div class="framework-item">
      <div class="framework-name">${escapeHtml(f.name)}</div>
      <div class="framework-desc">${escapeHtml(f.desc)}</div>
    </div>
  `).join('');
}

function renderLog() {
  const container = document.getElementById('log-tab');
  if (!answers.length) {
    container.innerHTML = '<p style="text-align:center; padding:2rem; color:#7b8a9b;">No answers yet. Tap a card to begin.</p>';
    return;
  }
  container.innerHTML = answers.map((a, i) => `
    <div class="log-entry">
      <div class="log-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <span>${escapeHtml(a.title)}</span>
        <span style="color: ${a.awarded > 0 ? '#45b3ff' : '#ffd166'}">${a.awarded}/${a.possible} pts</span>
      </div>
      <div class="log-body">
        <strong>Your answer:</strong><br>${escapeHtml(a.answer)}
        ${a.pending ? '<br><span style="color:#ffd166;">⏳ Waiting for facilitator scoring...</span>' : ''}
      </div>
    </div>
  `).join('');
}

function openCard(idx) {
  const card = cards[idx];
  if (card.used) {
    alert('You have already answered this card.');
    return;
  }
  activeCard = { idx, card };
  document.getElementById('modal-title').textContent = card.title;
  document.getElementById('modal-question').textContent = card.question;
  document.getElementById('modal-hint').innerHTML = `💡 Hint: ${card.hint}`;
  document.getElementById('answer').value = '';
  document.getElementById('modal').classList.add('open');
}

function submitAnswer() {
  const answer = document.getElementById('answer').value.trim();
  if (!answer) {
    alert('Please type an answer.');
    return;
  }
  
  const card = activeCard.card;
  card.used = true;
  
  answers.push({
    title: card.title,
    answer: answer,
    awarded: 0,
    possible: card.points,
    pending: true
  });
  
  // Save progress
  localStorage.setItem(`progress-${player.id}`, JSON.stringify({
    used: cards.filter(c => c.used).map(c => c.title),
    answers: answers
  }));
  
  // Add to pending answers for facilitator
  const pending = JSON.parse(localStorage.getItem('hf-pending-answers') || '[]');
  pending.push({
    id: Date.now(),
    playerId: player.id,
    playerName: player.name,
    cardTitle: card.title,
    answer: answer,
    possiblePoints: card.points
  });
  localStorage.setItem('hf-pending-answers', JSON.stringify(pending));
  
  closeModal();
  renderCards();
  renderLog();
  alert('✓ Answer submitted! Facilitator will review and award points.');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  activeCard = null;
}

function switchTab(tabName, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  document.getElementById('scenario-tab').classList.add('hidden');
  document.getElementById('cards-tab').classList.add('hidden');
  document.getElementById('frameworks-tab').classList.add('hidden');
  document.getElementById('log-tab').classList.add('hidden');
  
  if (tabName === 'scenario') document.getElementById('scenario-tab').classList.remove('hidden');
  if (tabName === 'cards') document.getElementById('cards-tab').classList.remove('hidden');
  if (tabName === 'frameworks') document.getElementById('frameworks-tab').classList.remove('hidden');
  if (tabName === 'log') document.getElementById('log-tab').classList.remove('hidden');
}

function exitGame() {
  if (confirm('Exit this case study?')) {
    window.location.href = 'index.html';
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function refreshData() {
  // Refresh player score
  const updatedPlayers = JSON.parse(localStorage.getItem('hf-participants') || '[]');
  const updatedPlayer = updatedPlayers.find(p => p.id === player.id);
  if (updatedPlayer && updatedPlayer.score !== player.score) {
    player.score = updatedPlayer.score;
    updateScore();
    renderScoreBar();
  }
  
  // Check for session changes
  checkForActiveCase();
}

// Initialize
loadPlayer();

// Start checking for active case every 2 seconds
checkInterval = setInterval(() => {
  checkForActiveCase();
  refreshData();
}, 2000);

// Initial check
checkForActiveCase();
</script>
</body>
</html>
