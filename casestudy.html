<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Flight 261 | Human Factors Case Study</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a2a3a 0%, #0d1b2a 50%, #1b263b 100%);
      color: #e0e1dd;
      min-height: 100vh;
    }
    
    /* Announcement Banner */
    .announcement-banner {
      background: linear-gradient(135deg, #1a6bc3, #0d3b5e);
      color: white;
      padding: 0.75rem 1.5rem;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 500;
      position: relative;
      display: none;
    }
    
    .announcement-banner.show {
      display: block;
      animation: slideDown 0.3s ease;
    }
    
    .announcement-close {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 1.2rem;
      opacity: 0.7;
    }
    
    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to { transform: translateY(0); }
    }
    
    .header {
      background: rgba(13, 27, 42, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(69, 179, 255, 0.3);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .logo h1 {
      font-family: 'Inter', sans-serif;
      font-size: 1.3rem;
      font-weight: 600;
      background: linear-gradient(135deg, #ffffff 0%, #45b3ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .logo p {
      font-size: 0.6rem;
      color: #7b8a9b;
    }
    
    .player-info {
      text-align: right;
    }
    
    .player-name {
      font-size: 1rem;
      font-weight: 600;
      color: #ffd166;
    }
    
    .player-score {
      font-size: 0.75rem;
      color: #45b3ff;
    }
    
    .grade-badge {
      display: inline-block;
      font-size: 0.65rem;
      padding: 0.2rem 0.5rem;
      border-radius: 20px;
      margin-left: 0.5rem;
    }
    
    .grade-attended { background: rgba(230, 57, 70, 0.2); color: #e63946; border: 1px solid rgba(230, 57, 70, 0.3); }
    .grade-completed { background: rgba(69, 179, 255, 0.2); color: #45b3ff; border: 1px solid rgba(69, 179, 255, 0.3); }
    .grade-distinction { background: rgba(46, 196, 182, 0.2); color: #2ec4b6; border: 1px solid rgba(46, 196, 182, 0.3); }
    
    .exit-btn, .results-btn, .cert-btn {
      background: transparent;
      border: 1px solid #7b8a9b;
      color: #7b8a9b;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.6rem;
      margin-top: 0.2rem;
      margin-left: 0.3rem;
    }
    
    .exit-btn:hover, .results-btn:hover, .cert-btn:hover {
      border-color: #ffd166;
      color: #ffd166;
    }
    
    .score-bar {
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem 1.5rem;
      overflow-x: auto;
      background: rgba(13, 27, 42, 0.5);
      border-bottom: 1px solid rgba(69, 179, 255, 0.2);
    }
    
    .score-chip {
      font-size: 0.7rem;
      padding: 0.25rem 0.7rem;
      background: rgba(27, 38, 59, 0.8);
      border: 1px solid rgba(69, 179, 255, 0.3);
      border-radius: 20px;
      white-space: nowrap;
    }
    
    .score-chip.active {
      border-color: #ffd166;
      background: rgba(255, 209, 102, 0.15);
      color: #ffd166;
    }
    
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 1.5rem;
      padding: 1.5rem;
    }
    
    @media (max-width: 900px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }
    
    .wear-card {
      background: rgba(27, 38, 59, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(69, 179, 255, 0.2);
      border-radius: 20px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    
    .svg-container {
      background: rgba(13, 27, 42, 0.8);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    
    .wear-stats {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    
    .wear-stat {
      flex: 1;
      background: rgba(13, 27, 42, 0.5);
      padding: 0.75rem;
      border-radius: 12px;
      text-align: center;
    }
    
    .wear-stat-label {
      font-size: 0.6rem;
      color: #7b8a9b;
    }
    
    .wear-stat-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: #ffd166;
    }
    
    .integrity-bar {
      height: 8px;
      background: #2a2e3a;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 0.5rem;
    }
    
    .integrity-fill {
      height: 100%;

    }
    
    .dossier-card {
      background: rgba(27, 38, 59, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(69, 179, 255, 0.2);
      border-radius: 20px;
      padding: 1.5rem;
    }
    
    .dossier-header {

      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;

    }
    
    .dossier-number {

    .dossier-framework {

    .dossier-title {

    }
    
    .dossier-scenario {

      border-radius: 12px;

      line-height: 1.6;
      margin-bottom: 1.25rem;
    }
    
    .question-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #ffd166;
      margin-bottom: 0.5rem;
    }
    
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    
    .option-radio {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(13, 27, 42, 0.5);

      border-radius: 12px;

    .option-radio:hover {

    }
    
    .option-text {

    }
    
    .btn-submit {

      color: white;
      border: none;
      padding: 0.75rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
    }
    
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(69, 179, 255, 0.3);
    }
    
    .btn-secondary {
      background: rgba(69, 179, 255, 0.15);
      border: 1px solid rgba(69, 179, 255, 0.3);
      color: #45b3ff;
      padding: 0.5rem 1rem;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.7rem;
    }
    
    .complete-card {
      text-align: center;
      padding: 2rem;
    }
    
    .complete-icon {
      width: 60px;
      height: 60px;
      background: rgba(46, 196, 182, 0.15);
      border: 2px solid #2ec4b6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 2rem;
    }
    
    .sidebar-card {
      background: rgba(27, 38, 59, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(69, 179, 255, 0.2);
      border-radius: 20px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    
    .sidebar-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #ffd166;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
    }
    
    .insight-feed {
      max-height: 400px;
      overflow-y: auto;
    }
    
    .insight-item {
      background: rgba(13, 27, 42, 0.5);
      padding: 0.75rem;
      border-radius: 12px;
      margin-bottom: 0.75rem;
    }
    
    .insight-name {
      font-size: 0.7rem;
      color: #45b3ff;
      margin-bottom: 0.3rem;
    }
    
    .insight-text {
      font-size: 0.75rem;
      line-height: 1.4;
      font-style: italic;
    }
    
    .insight-factors {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.5rem;
    }
    
    .insight-factor {
      font-size: 0.6rem;
      background: rgba(69, 179, 255, 0.15);
      padding: 0.15rem 0.5rem;
      border-radius: 12px;
    }
    
    .correct-answer {
      font-size: 0.7rem;
      color: #ffd166;
      margin-top: 0.3rem;
      padding-top: 0.3rem;
      border-top: 1px solid rgba(255, 209, 102, 0.2);
    }
    
    .privacy-note {
      font-size: 0.6rem;
      color: #7b8a9b;
      text-align: center;
      padding: 0.5rem;
      border-top: 1px solid rgba(69, 179, 255, 0.2);
      margin-top: 0.5rem;
    }
    
    .waiting {
      text-align: center;
      padding: 2rem;
      color: #7b8a9b;
    }
    
    .hidden {
      display: none;
    }
    
    .facilitator-only {
      display: none;
    }
    
    body.facilitator .facilitator-only {
      display: block;
    }
    
    .analytics-chart {
      background: rgba(13, 27, 42, 0.5);
      border-radius: 12px;
      padding: 1rem;
      margin-top: 1rem;
    }
    
    .chart-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }
    
    .chart-bar-label {
      width: 140px;
      flex-shrink: 0;
      font-size: 0.7rem;
    }
    
    .chart-bar-fill {
      height: 20px;
      background: linear-gradient(90deg, #45b3ff, #1a6bc3);
      border-radius: 10px;
      transition: width 0.3s ease;
    }
    
    .mode-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
    }
    
    .mode-btn {
      background: rgba(13, 27, 42, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(69, 179, 255, 0.3);
      padding: 0.5rem 1rem;
      border-radius: 30px;
      font-size: 0.7rem;
      cursor: pointer;
    }
    
    .scoring-info {
      font-size: 0.65rem;
      color: #7b8a9b;
      margin-top: 0.5rem;
      text-align: center;
    }
    
    .grade-container {
      background: rgba(13, 27, 42, 0.5);
      border-radius: 12px;
      padding: 0.75rem;
      margin-top: 1rem;
      text-align: center;
    }
    
    .success-message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(46, 196, 182, 0.9);
      color: #000;
      padding: 0.5rem 1rem;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
      z-index: 2000;
      animation: fadeOut 3s ease forwards;
    }
    
    @keyframes fadeOut {
      0% { opacity: 1; transform: translateX(-50%) translateY(0); }
      70% { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
    }
    
    /* Results Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    
    .modal-overlay.open {
      display: flex;
    }
    
    .modal {
      background: #1b263b;
      border: 1px solid rgba(69, 179, 255, 0.3);
      border-radius: 24px;
      max-width: 700px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
    }
    
    .modal-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid rgba(69, 179, 255, 0.2);
      font-size: 1.2rem;
      font-weight: 600;
      color: #ffd166;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-body {
      padding: 1.5rem;
    }
    
    .review-question {
      background: rgba(13, 27, 42, 0.5);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    
    .review-question.correct {
      border-left: 3px solid #2ec4b6;
    }
    
    .review-question.incorrect {
      border-left: 3px solid #e63946;
    }
    
    .review-question-title {
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    
    .review-answer {
      font-size: 0.8rem;
      margin-top: 0.3rem;
    }
    
    .timer-display {
      font-size: 0.8rem;
      font-family: monospace;
      color: #ffd166;
      margin-left: 0.5rem;
    }
    
    .session-ended {
      text-align: center;
      padding: 3rem;
    }
  </style>
</head>
<body id="app-body">
  <!-- Announcement Banner -->
  <div id="announcement-banner" class="announcement-banner">
    <span id="announcement-text">📢 Facilitator announcement</span>
    <button class="announcement-close" onclick="dismissAnnouncement()">×</button>
  </div>
  
  <div class="header">
    <div class="logo">
      <h1>✈️ FLIGHT 261 | HUMAN FACTORS CASE STUDY</h1>
      <p>NCAR Part 145 • Alaska Airlines • 31 January 2000</p>
    </div>
    <div class="player-info">
      <div class="player-name" id="player-name">Loading...</div>
      <div class="player-score" id="player-score">Score: 0 pts</div>
      <div>
        <button class="results-btn" onclick="showMyResults()">📋 My Results</button>
        <button class="cert-btn" onclick="generateCertificate()">🏆 Certificate</button>
        <button class="exit-btn" onclick="exitToJoin()">✕ Exit</button>
      </div>
    </div>
  </div>
  
  <div class="score-bar" id="score-bar"></div>
  
  <div id="session-ended-message" class="hidden">
    <div class="session-ended">
      <div class="complete-icon">⏰</div>
      <h2>Session Has Ended</h2>
      <p>The training session has concluded. Please see the facilitator for your certificate.</p>
    </div>
  </div>
  
  <div class="main-grid" id="main-content"></div>
  
  <div class="mode-toggle">
    <button class="mode-btn" onclick="toggleMode()" id="mode-toggle-btn">👨‍🏫 Facilitator Mode</button>
  </div>
  
  <!-- Results Modal -->
  <div id="results-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <span>📋 My Results - Flight 261 Case Study</span>
        <button onclick="closeResultsModal()" style="background: none; border: none; color: #7b8a9b; cursor: pointer;">✕</button>
      </div>
      <div class="modal-body" id="results-modal-body"></div>
    </div>
  </div>

  <script>
    // ============================================
    // COMPLETE CASE STUDY CARDS - 500 Points Total
    // ============================================
    const DOSSIER_CARDS = [
      {
        id: 1,
        title: "The Maintenance Override",
        framework: "Dirty Dozen (Gordon Dupont)",
        scenario: "During a C-Check in September 1997, a technician measures the jackscrew end-play at its maximum allowable limit (0.040 inches). The technician recommends replacement. However, the replacement part is not in stock. The aircraft is already two days behind schedule. A maintenance supervisor, facing pressure to return the aircraft to service, overrides the technician's recommendation and signs the aircraft back to active service.",
        question: "Which Dirty Dozen factors were most clearly at work in the supervisor's decision to override the technician?",
        options: [
          { text: "Pressure, Lack of Resources, and Norms", correct: true, points: 100 },
          { text: "Fatigue, Distraction, and Stress", correct: false, points: 0 },
          { text: "Complacency and Lack of Teamwork only", correct: false, points: 0 },
          { text: "Lack of Knowledge and Communication Breakdown", correct: false, points: 0 }
        ],
        correctAnswer: "Pressure, Lack of Resources, and Norms",
        explanation: "The supervisor faced schedule pressure (aircraft already late), lack of resources (replacement part not in stock), and norms (deferral had become standard practice at the airline).",
        wearLevel: 0.033,
        integrity: 78,
        pointsPossible: 100
      },
      {
        id: 2,
        title: "The Failed Layers of Defense",
        framework: "Swiss Cheese Model (James Reason)",
        scenario: "The jackscrew lubrication interval had been extended from 650 to 2,550 flight hours with FAA approval. The supervisor overrode the replacement recommendation. The technician did not escalate further. The inspection sign-off was completed without physical verification of the thread condition.",
        question: "According to Reason's Swiss Cheese Model, how many defensive layers failed in this accident? Name the specific holes in each layer.",
        options: [
          { text: "4 layers: Regulatory (FAA approval), Organizational (deferral culture), Supervisory (override), and Inspection (paper compliance)", correct: true, points: 100 },
          { text: "2 layers: Only the technician and supervisor failed", correct: false, points: 0 },
          { text: "5 layers including design flaw and pilot error", correct: false, points: 0 },
          { text: "Only the FAA regulatory layer failed", correct: false, points: 0 }
        ],
        correctAnswer: "4 layers: Regulatory (FAA approval), Organizational (deferral culture), Supervisory (override), and Inspection (paper compliance)",
        explanation: "Multiple layers failed: Regulatory (approved dangerous interval), Organizational (normalized deferral), Supervisory (overrode concern), Inspection (signed off without verification).",
        wearLevel: 0.055,
        integrity: 50,
        pointsPossible: 100
      },
      {
        id: 3,
        title: "The Supervisor's Rational Choice",
        framework: "Safety Differently (Sidney Dekker)",
        scenario: "The supervisor who overrode the technician's recommendation was not acting maliciously. From his perspective, the aircraft was already late, the part was not available, and previous deferrals had never caused an accident.",
        question: "What does Dekker mean by 'human error is a symptom, not a cause'? Apply this to the supervisor's decision.",
        options: [
          { text: "The supervisor's decision was locally rational given the pressures, resources, and information available at the time", correct: true, points: 100 },
          { text: "The supervisor was lazy and should be fired", correct: false, points: 0 },
          { text: "Only the technician is responsible for the accident", correct: false, points: 0 },
          { text: "Human error cannot be prevented, so we should accept it", correct: false, points: 0 }
        ],
        correctAnswer: "The supervisor's decision was locally rational given the pressures, resources, and information available at the time",
        explanation: "Dekker argues that blaming individuals hides systemic causes. The supervisor's override made sense given schedule pressure, parts unavailability, and no prior failures from deferrals.",
        wearLevel: 0.082,
        integrity: 22,
        pointsPossible: 100
      },
      {
        id: 4,
        title: "The Silent Technician",
        framework: "Psychological Safety (Amy Edmondson)",
        scenario: "The technician raised the concern once, was overruled, and did not escalate further. No safety report was filed. The organization had a history of valuing schedule compliance over safety concerns.",
        question: "Using Edmondson's framework, what does this tell us about psychological safety at Alaska Airlines?",
        options: [
          { text: "The workplace lacked psychological safety, making speaking up feel futile and potentially dangerous for career advancement", correct: true, points: 100 },
          { text: "The technician was simply afraid of the supervisor", correct: false, points: 0 },
          { text: "The organization had excellent safety culture", correct: false, points: 0 },
          { text: "Only the technician is responsible for not speaking up again", correct: false, points: 0 }
        ],
        correctAnswer: "The workplace lacked psychological safety, making speaking up feel futile and potentially dangerous for career advancement",
        explanation: "Edmondson's research shows that when psychological safety is absent, people choose silence over speaking up, even about serious safety concerns.",
        wearLevel: 0.095,
        integrity: 10,
        pointsPossible: 100
      },
      {
        id: 5,
        title: "The Gap Between Paper and Reality",
        framework: "Work-as-Done (Todd Conklin)",
        scenario: "The maintenance task card was signed and certified as complete. The lubrication was documented as performed. Yet the jackscrew failed catastrophically due to inadequate lubrication over years.",
        question: "What is the gap between 'work-as-imagined' and 'work-as-done' in this accident?",
        options: [
          { text: "Work-as-imagined assumes ideal conditions (rested tech, time, resources); work-as-done happened under pressure, fatigue, and parts shortage", correct: true, points: 100 },
          { text: "The paperwork was forged", correct: false, points: 0 },
          { text: "The technicians were not trained properly", correct: false, points: 0 },
          { text: "There is no gap - compliance equals safety", correct: false, points: 0 }
        ],
        correctAnswer: "Work-as-imagined assumes ideal conditions (rested tech, time, resources); work-as-done happened under pressure, fatigue, and parts shortage",
        explanation: "Conklin teaches that work-as-imagined (the procedure) and work-as-done (reality) always differ. The signature looked the same, but the safety outcome was completely different.",
        wearLevel: 0.115,
        integrity: 0,
        pointsPossible: 100
      }
    ];
    
    // Grading thresholds (out of 500)
    const GRADING = {
      distinction: 400,
      completed: 350,
      attended: 0
    };
    
    // Session timer (30 minutes = 1800 seconds)
    let sessionEndTime = null;
    let sessionTimer = null;
    let isSessionActive = true;
    
    function getGrade(score) {
      if (score >= GRADING.distinction) {
        return { name: "Completed with Distinction", class: "grade-distinction", icon: "🏆" };
      } else if (score >= GRADING.completed) {
        return { name: "Completed", class: "grade-completed", icon: "✅" };
      } else {
        return { name: "Attended", class: "grade-attended", icon: "📋" };
      }
    }
    
    function showSuccessMessage(message) {
      const div = document.createElement('div');
      div.className = 'success-message';
      div.textContent = message;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 3000);
    }
    
    function showAnnouncement(message) {
      const banner = document.getElementById('announcement-banner');
      const text = document.getElementById('announcement-text');
      text.textContent = message;
      banner.classList.add('show');
      setTimeout(() => {
        banner.classList.remove('show');
      }, 10000);
    }
    
    function dismissAnnouncement() {
      document.getElementById('announcement-banner').classList.remove('show');
    }
    
    // Session timer functions
    function startSessionTimer() {
      if (sessionTimer) clearInterval(sessionTimer);
      
      sessionEndTime = localStorage.getItem('hf-session-end-time');
      if (!sessionEndTime) {
        sessionEndTime = Date.now() + (30 * 60 * 1000);
        localStorage.setItem('hf-session-end-time', sessionEndTime);
      }
      
      sessionTimer = setInterval(() => {
        const now = Date.now();
        const timeLeft = sessionEndTime - now;
        
        if (timeLeft <= 0 && isSessionActive) {
          endSession();
        } else if (isSessionActive) {
          const minutes = Math.floor(timeLeft / 60000);
          const seconds = Math.floor((timeLeft % 60000) / 1000);
          const timerDisplay = document.getElementById('session-timer-display');
          if (timerDisplay) {
            timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
          }
        }
      }, 1000);
    }
    
    function endSession() {
      isSessionActive = false;
      clearInterval(sessionTimer);
      document.getElementById('session-ended-message').classList.remove('hidden');
      document.getElementById('main-content').innerHTML = `
        <div class="dossier-card" style="grid-column: 1/-1;">
          <div class="session-ended">
            <div class="complete-icon">⏰</div>
            <h2>Session Has Ended</h2>
            <p>The 30-minute training session has concluded.</p>
            <p>Your final score: ${currentPlayer?.score || 0} / 500 points</p>
            <button class="btn-secondary" style="margin-top: 1rem;" onclick="generateCertificate()">🏆 Download Certificate</button>
          </div>
        </div>
      `;
    }
    
    function checkAllParticipantsComplete() {
      const allPlayers = JSON.parse(localStorage.getItem('hf-participants') || '[]');
      const allComplete = allPlayers.every(p => {
        const progress = localStorage.getItem(`case-progress-${p.id}`);
        if (progress) {
          const data = JSON.parse(progress);
          return data.submittedCards.length >= DOSSIER_CARDS.length;
        }
        return false;
      });
      
      if (allComplete && allPlayers.length > 0 && isSessionActive) {
        showAnnouncement("🎉 All participants have completed the case study! Session will end in 30 seconds.");
        setTimeout(() => {
          if (isSessionActive) endSession();
        }, 30000);
      }
    }
    
    let currentPlayer = null;
    let allPlayers = [];
    let currentCardIndex = 0;
    let submittedCards = [];
    let isFacilitatorMode = false;
    let sessionResponses = [];
    
    function loadPlayer() {
      const saved = localStorage.getItem('hf-current-player');
      if (!saved) {
        window.location.href = 'index.html';
        return;
      }
      currentPlayer = JSON.parse(saved);
      document.getElementById('player-name').textContent = currentPlayer.name;
      updateScoreDisplay();
      
      // Check if session is still active
      const sessionEnd = localStorage.getItem('hf-session-end-time');
      if (sessionEnd && Date.now() > parseInt(sessionEnd)) {
        isSessionActive = false;
        document.getElementById('session-ended-message').classList.remove('hidden');
      } else {
        startSessionTimer();
      }
    }
    
    function updateScoreDisplay() {
      const score = currentPlayer.score || 0;
      const grade = getGrade(score);
      document.getElementById('player-score').innerHTML = `Score: ${score} pts <span class="grade-badge ${grade.class}">${grade.icon} ${grade.name}</span>`;
    }
    
    function loadSessionData() {
      allPlayers = JSON.parse(localStorage.getItem('hf-participants') || '[]');
      const updatedPlayer = allPlayers.find(p => p.id === currentPlayer.id);
      if (updatedPlayer) {
        currentPlayer.score = updatedPlayer.score;
        updateScoreDisplay();
      }
      
      const saved = localStorage.getItem(`case-progress-${currentPlayer.id}`);
      if (saved) {
        const progress = JSON.parse(saved);
        submittedCards = progress.submittedCards || [];
        currentCardIndex = submittedCards.length;

      sessionResponses = JSON.parse(localStorage.getItem('hf-session-responses') || '[]');

    function renderThreadVisualizer(card) {
      const container = document.getElementById('thread-svg-container');
      if (!container) return;
      
      const wearRatio = Math.min(1, Math.max(0, card.wearLevel / 0.12));
      const nutColor = card.integrity > 60 ? '#2ec4b6' : card.integrity > 20 ? '#ffd166' : '#e63946';
      
      container.innerHTML = `
        <svg width="100%" height="100" viewBox="0 0 500 80" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="30" width="480" height="20" fill="#27272a" stroke="#52525b" stroke-width="1" />
          ${Array.from({ length: 15 }, (_, i) => {
            const x = 25 + (i * 30);
            const threadHeight = 12 * (1 - wearRatio * 0.7);
            const threadColor = wearRatio > 0.7 ? '#e63946' : wearRatio > 0.4 ? '#ffd166' : '#d4d4d8';
            return `
              <path d="M ${x} 30 L ${x + 8} ${18 + (15 - threadHeight)} L ${x + 22} ${18 + (15 - threadHeight)} L ${x + 30} 30 Z" fill="${threadColor}" stroke="#71717a" stroke-width="0.5" opacity="${1 - wearRatio * 0.5}" />
              <path d="M ${x} 50 L ${x + 8} ${62 + (15 - threadHeight)} L ${x + 22} ${62 + (15 - threadHeight)} L ${x + 30} 50 Z" fill="${threadColor}" stroke="#71717a" stroke-width="0.5" opacity="${1 - wearRatio * 0.5}" />
            `;
          }).join('')}
          <g transform="translate(200, 15)">
            <rect x="0" y="0" width="100" height="50" fill="rgba(69, 179, 255, 0.05)" stroke="${nutColor}" stroke-width="2" rx="4" />
            <text x="50" y="28" fill="${nutColor}" font-size="9" font-family="monospace" text-anchor="middle">ACME NUT</text>
            ${card.integrity === 0 ? '<text x="50" y="42" fill="#e63946" font-size="7" text-anchor="middle">STRIPPED</text>' : ''}
          </g>
        </svg>
      `;
    }

    function sendAnnouncement() {

          message: message,
          timestamp: Date.now()
        }));
        showSuccessMessage('Announcement sent to all participants');
        input.value = '';
      }
    }
    
    function sendQuickAnnouncement(message) {
      localStorage.setItem('hf-announcement', JSON.stringify({
        message: message,
        timestamp: Date.now()
      }));
      showSuccessMessage('Announcement sent');
    }
    
    function checkForAnnouncements() {
      const saved = localStorage.getItem('hf-announcement');
      if (saved) {
        const announcement = JSON.parse(saved);
        if (Date.now() - announcement.timestamp < 5000) {
          showAnnouncement(announcement.message);
          localStorage.removeItem('hf-announcement');
        }
      }
    }
    
    function extendSessionTime() {
      const currentEnd = parseInt(localStorage.getItem('hf-session-end-time')) || Date.now();
      const newEnd = currentEnd + (5 * 60 * 1000);
      localStorage.setItem('hf-session-end-time', newEnd);
      sessionEndTime = newEnd;
      showSuccessMessage('Session extended by 5 minutes');
    }

            <div class="review-answer" style="font-size: 0.7rem; color: #7b8a9b; margin-top: 0.5rem;">
              <strong>Explanation:</strong> ${card.explanation}
            </div>
          </div>
        `;
      });
      
      body.innerHTML = resultsHtml;
      modal.classList.add('open');
    }
    
    function closeResultsModal() {
      document.getElementById('results-modal').classList.remove('open');
    }

    async function submitResponse(cardIndex) {
      const card = DOSSIER_CARDS[cardIndex];
      
      const selectedRadio = document.querySelector('input[name="answer"]:checked');
      if (!selectedRadio) {
        showSuccessMessage('⚠️ Please select an answer before submitting');
        return;
      }
      
      const selectedIndex = parseInt(selectedRadio.value);
      const selectedOption = card.options[selectedIndex];
      const isCorrect = selectedOption.correct;
      const pointsEarned = isCorrect ? card.pointsPossible : 0;
      
      currentPlayer.score = (currentPlayer.score || 0) + pointsEarned;
      
      const playerIndex = allPlayers.findIndex(p => p.id === currentPlayer.id);
      if (playerIndex !== -1) {
        allPlayers[playerIndex].score = currentPlayer.score;
        localStorage.setItem('hf-participants', JSON.stringify(allPlayers));
      }
      
      submittedCards.push({
        cardId: card.id,
        cardTitle: card.title,
        cardFramework: card.framework,
        selectedAnswer: selectedOption.text,
        isCorrect: isCorrect,
        pointsEarned: pointsEarned,
        pointsPossible: card.pointsPossible
      });
      
      localStorage.setItem(`case-progress-${currentPlayer.id}`, JSON.stringify({
        submittedCards: submittedCards,
        completedAt: new Date().toISOString()
      }));
      
      sessionResponses.push({
        playerId: currentPlayer.id,
        playerName: currentPlayer.name,
        cardId: card.id,
        cardTitle: card.title,
        cardFramework: card.framework,
        selectedAnswer: selectedOption.text,
        isCorrect: isCorrect,
        pointsEarned: pointsEarned,
        pointsPossible: card.pointsPossible,
        correctAnswerText: card.correctAnswer,
        totalScore: currentPlayer.score,
        timestamp: new Date().toISOString()
      });
      localStorage.setItem('hf-session-responses', JSON.stringify(sessionResponses));
      
      updateScoreDisplay();
      currentCardIndex++;
      renderMainContent();
      checkAllParticipantsComplete();
      
      if (isCorrect) {
        showSuccessMessage(`✓ Correct! +${pointsEarned} points`);
      } else {
        showSuccessMessage(`✗ Incorrect. The correct answer is: ${card.correctAnswer}`);
      }
    }
    
    function toggleMode() {
      isFacilitatorMode = !isFacilitatorMode;
      const btn = document.getElementById('mode-toggle-btn');
      const body = document.getElementById('app-body');
      
      if (isFacilitatorMode) {
        btn.textContent = '👥 Participant Mode';
        body.classList.add('facilitator');
      } else {
        btn.textContent = '👨‍🏫 Facilitator Mode';
        body.classList.remove('facilitator');
      }
      
      renderMainContent();
    }
    
    function resetAllProgress() {
      if (confirm('⚠️ Reset all participant progress? This will clear all scores and submissions.')) {
        const keys = Object.keys(localStorage);
        keys.forEach(key => {
          if (key.startsWith('case-progress-')) {
            localStorage.removeItem(key);
          }
        });
        localStorage.removeItem('hf-session-responses');
        
        currentPlayer.score = 0;
        const playerIndex = allPlayers.findIndex(p => p.id === currentPlayer.id);
        if (playerIndex !== -1) {
          allPlayers[playerIndex].score = 0;
          localStorage.setItem('hf-participants', JSON.stringify(allPlayers));
        }
        
        submittedCards = [];
        currentCardIndex = 0;
        sessionResponses = [];
        
        updateScoreDisplay();
        renderMainContent();
        showSuccessMessage('Session reset complete');
      }
    }
    
    function clearAllResponses() {
      if (confirm('⚠️ Clear all participant responses? This cannot be undone.')) {
        localStorage.removeItem('hf-session-responses');
        sessionResponses = [];
        renderMainContent();
        showSuccessMessage('All responses cleared');
      }
    }
    
    function exitToJoin() {
      if (confirm('Exit this session? Your progress will be saved.')) {
        window.location.href = 'index.html';
      }
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    function refreshData() {
      const updatedPlayers = JSON.parse(localStorage.getItem('hf-participants') || '[]');
      const updatedPlayer = updatedPlayers.find(p => p.id === currentPlayer.id);
      if (updatedPlayer && updatedPlayer.score !== currentPlayer.score) {
        currentPlayer.score = updatedPlayer.score;
        updateScoreDisplay();
      }
      
      const updatedResponses = JSON.parse(localStorage.getItem('hf-session-responses') || '[]');
      if (JSON.stringify(sessionResponses) !== JSON.stringify(updatedResponses)) {
        sessionResponses = updatedResponses;
        if (!isFacilitatorMode) {
          renderInsightFeed();
        } else {
          renderMainContent();
        }
      }
      
      const updatedAllPlayers = JSON.parse(localStorage.getItem('hf-participants') || '[]');
      if (JSON.stringify(allPlayers) !== JSON.stringify(updatedAllPlayers)) {
        allPlayers = updatedAllPlayers;
        renderScoreBar();
        if (isFacilitatorMode) {
          renderMainContent();
        }
      }
      
      checkForAnnouncements();
    }
    
    // Initialize
    loadPlayer();
    loadSessionData();
    setInterval(refreshData, 3000);
  </script>
