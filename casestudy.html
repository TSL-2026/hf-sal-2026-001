<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Flight 261 | Human Factors Case Study</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a2a3a 0%, #0d1b2a 50%, #1b263b 100%);
      color: #e0e1dd;
      min-height: 100vh;
    }
    
    .header {
      background: rgba(13, 27, 42, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(69, 179, 255, 0.3);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .logo h1 {
      font-family: 'Inter', sans-serif;
      font-size: 1.3rem;
      font-weight: 600;
      background: linear-gradient(135deg, #ffffff 0%, #45b3ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .logo p {
      font-size: 0.6rem;
      color: #7b8a9b;
    }
    
    .player-info {
      text-align: right;
    }
    
    .player-name {
      font-size: 1rem;
      font-weight: 600;
      color: #ffd166;
    }
    
    .player-score {
      font-size: 0.75rem;
      color: #45b3ff;
    }
    
    .grade-badge {
      display: inline-block;
      font-size: 0.65rem;
      padding: 0.2rem 0.5rem;
      border-radius: 20px;
      margin-left: 0.5rem;
    }
    
    .grade-attended { background: rgba(230, 57, 70, 0.2); color: #e63946; border: 1px solid rgba(230, 57, 70, 0.3); }
    .grade-completed { background: rgba(69, 179, 255, 0.2); color: #45b3ff; border: 1px solid rgba(69, 179, 255, 0.3); }
    .grade-distinction { background: rgba(46, 196, 182, 0.2); color: #2ec4b6; border: 1px solid rgba(46, 196, 182, 0.3); }
    
    .exit-btn {
      background: transparent;
      border: 1px solid #7b8a9b;
      color: #7b8a9b;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.6rem;
      margin-top: 0.2rem;
    }
    
    .score-bar {
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem 1.5rem;
      overflow-x: auto;
      background: rgba(13, 27, 42, 0.5);
      border-bottom: 1px solid rgba(69, 179, 255, 0.2);
    }
    
    .score-chip {
      font-size: 0.7rem;
      padding: 0.25rem 0.7rem;
      background: rgba(27, 38, 59, 0.8);
      border: 1px solid rgba(69, 179, 255, 0.3);
      border-radius: 20px;
      white-space: nowrap;
    }
    
    .score-chip.active {
      border-color: #ffd166;
      background: rgba(255, 209, 102, 0.15);
      color: #ffd166;
    }
    
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 1.5rem;
      padding: 1.5rem;
    }
    
    @media (max-width: 900px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }
    
    .wear-card {
      background: rgba(27, 38, 59, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(69, 179, 255, 0.2);
      border-radius: 20px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    
    .wear-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #7b8a9b;
      margin-bottom: 1rem;
    }
    
    .svg-container {
      background: rgba(13, 27, 42, 0.8);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    
    .wear-stats {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    
    .wear-stat {
      flex: 1;
      background: rgba(13, 27, 42, 0.5);
      padding: 0.75rem;
      border-radius: 12px;
      text-align: center;
    }
    
    .wear-stat-label {
      font-size: 0.6rem;
      color: #7b8a9b;
    }
    
    .wear-stat-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: #ffd166;
    }
    
    .integrity-bar {
      height: 8px;
      background: #2a2e3a;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 0.5rem;
    }
    
    .integrity-fill {
      height: 100%;
      width: 100%;
      transition: width 0.5s ease;
    }
    
    .dossier-card {
      background: rgba(27, 38, 59, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(69, 179, 255, 0.2);
      border-radius: 20px;
      padding: 1.5rem;
    }
    
    .dossier-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(69, 179, 255, 0.2);
    }
    
    .dossier-number {
      font-size: 0.7rem;
      color: #ffd166;
      font-family: monospace;
    }
    
    .dossier-framework {
      font-size: 0.7rem;
      color: #45b3ff;
      font-family: monospace;
      background: rgba(69, 179, 255, 0.1);
      padding: 0.2rem 0.5rem;
      border-radius: 20px;
      white-space: normal;
      word-break: keep-all;
    }
    
    .dossier-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    
    .dossier-scenario {
      background: rgba(13, 27, 42, 0.5);
      padding: 1rem;
      border-radius: 12px;
      font-size: 0.85rem;
      line-height: 1.6;
      margin-bottom: 1.25rem;
    }
    
    .question-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #ffd166;
      margin-bottom: 0.5rem;
    }
    
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    
    .option-radio {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(13, 27, 42, 0.5);
      padding: 0.6rem 1rem;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .option-radio:hover {
      background: rgba(69, 179, 255, 0.15);
    }
    
    .option-radio input {
      accent-color: #45b3ff;
      width: 16px;
      height: 16px;
    }
    
    .option-text {
      font-size: 0.85rem;
    }
    
    .btn-submit {
      background: linear-gradient(135deg, #45b3ff, #1a6bc3);
      color: white;
      border: none;
      padding: 0.75rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
    }
    
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(69, 179, 255, 0.3);
    }
    
    .complete-card {
      text-align: center;
      padding: 2rem;
    }
    
    .complete-icon {
      width: 60px;
      height: 60px;
      background: rgba(46, 196, 182, 0.15);
      border: 2px solid #2ec4b6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 2rem;
    }
    
    .sidebar-card {
      background: rgba(27, 38, 59, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(69, 179, 255, 0.2);
      border-radius: 20px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    
    .sidebar-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #ffd166;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
    }
    
    .insight-feed {
      max-height: 400px;
      overflow-y: auto;
    }
    
    .insight-item {
      background: rgba(13, 27, 42, 0.5);
      padding: 0.75rem;
      border-radius: 12px;
      margin-bottom: 0.75rem;
    }
    
    .insight-name {
      font-size: 0.7rem;
      color: #45b3ff;
      margin-bottom: 0.3rem;
    }
    
    .insight-text {
      font-size: 0.75rem;
      line-height: 1.4;
      font-style: italic;
    }
    
    .insight-factors {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.5rem;
    }
    
    .insight-factor {
      font-size: 0.6rem;
      background: rgba(69, 179, 255, 0.15);
      padding: 0.15rem 0.5rem;
      border-radius: 12px;
    }
    
    .correct-answer {
      font-size: 0.7rem;
      color: #ffd166;
      margin-top: 0.3rem;
      padding-top: 0.3rem;
      border-top: 1px solid rgba(255, 209, 102, 0.2);
    }
    
    .privacy-note {
      font-size: 0.6rem;
      color: #7b8a9b;
      text-align: center;
      padding: 0.5rem;
      border-top: 1px solid rgba(69, 179, 255, 0.2);
      margin-top: 0.5rem;
    }
    
    .waiting {
      text-align: center;
      padding: 2rem;
      color: #7b8a9b;
    }
    
    .hidden {
      display: none;
    }
    
    .facilitator-only {
      display: none;
    }
    
    body.facilitator .facilitator-only {
      display: block;
    }
    
    .analytics-chart {
      background: rgba(13, 27, 42, 0.5);
      border-radius: 12px;
      padding: 1rem;
      margin-top: 1rem;
    }
    
    .chart-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }
    
    .chart-bar-label {
      width: 140px;
      flex-shrink: 0;
      font-size: 0.7rem;
      white-space: normal;
      word-break: keep-all;
    }
    
    .chart-bar-fill {
      height: 20px;
      background: linear-gradient(90deg, #45b3ff, #1a6bc3);
      border-radius: 10px;
      transition: width 0.3s ease;
    }
    
    .mode-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
    }
    
    .mode-btn {
      background: rgba(13, 27, 42, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(69, 179, 255, 0.3);
      padding: 0.5rem 1rem;
      border-radius: 30px;
      font-size: 0.7rem;
      cursor: pointer;
    }
    
    .scoring-info {
      font-size: 0.65rem;
      color: #7b8a9b;
      margin-top: 0.5rem;
      text-align: center;
    }
    
    .grade-container {
      background: rgba(13, 27, 42, 0.5);
      border-radius: 12px;
      padding: 0.75rem;
      margin-top: 1rem;
      text-align: center;
    }
    
    .success-message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(46, 196, 182, 0.9);
      color: #000;
      padding: 0.5rem 1rem;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
      z-index: 2000;
      animation: fadeOut 2s ease forwards;
    }
    
    @keyframes fadeOut {
      0% { opacity: 1; transform: translateX(-50%) translateY(0); }
      70% { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
    }
  </style>
</head>
<body id="app-body">
  <div class="header">
    <div class="logo">
      <h1>✈️ FLIGHT 261 | HUMAN FACTORS CASE STUDY</h1>
      <p>NCAR Part 145 • Alaska Airlines • 31 January 2000</p>
    </div>
    <div class="player-info">
      <div class="player-name" id="player-name">Loading...</div>
      <div class="player-score" id="player-score">Score: 0 pts</div>
      <button class="exit-btn" onclick="exitToJoin()">✕ Exit Session</button>
    </div>
  </div>
  
  <div class="score-bar" id="score-bar"></div>
  
  <div class="main-grid" id="main-content"></div>
  
  <div class="mode-toggle">
    <button class="mode-btn" onclick="toggleMode()" id="mode-toggle-btn">👨‍🏫 Facilitator Mode</button>
  </div>

  <script>
    // ============================================
    // COMPLETE CASE STUDY CARDS - 500 Points Total
    // 5 Cards x 100 Points = 500 Points
    // Covers: Dirty Dozen, Swiss Cheese, Dekker, Edmondson, Conklin
    // ============================================
    const DOSSIER_CARDS = [
      {
        id: 1,
        title: "The Maintenance Override",
        framework: "Dirty Dozen (Gordon Dupont)",
        scenario: "During a C-Check in September 1997, a technician measures the jackscrew end-play at its maximum allowable limit (0.040 inches). The technician recommends replacement. However, the part is not in stock. The aircraft is already two days behind schedule. A supervisor overrides the technician and signs the aircraft back to service.",
        question: "Which Dirty Dozen factors were most clearly at work in the supervisor's decision to override the technician?",
        options: [
          { text: "Pressure, Lack of Resources, and Norms", correct: true, points: 100 },
          { text: "Fatigue, Distraction, and Stress", correct: false, points: 0 },
          { text: "Complacency and Lack of Teamwork only", correct: false, points: 0 },
          { text: "Lack of Knowledge and Communication Breakdown", correct: false, points: 0 }
        ],
        correctAnswer: "Pressure, Lack of Resources, and Norms",
        explanation: "The supervisor faced schedule pressure (aircraft already late), lack of resources (part not in stock), and norms (deferral had become standard practice at the airline).",
        wearLevel: 0.033,
        integrity: 78,
        pointsPossible: 100
      },
      {
        id: 2,
        title: "The Failed Layers of Defense",
        framework: "Swiss Cheese Model (James Reason)",
        scenario: "The jackscrew lubrication interval had been extended from 650 to 2,550 flight hours with FAA approval. The supervisor overrode the replacement recommendation. The technician did not escalate further. The inspection sign-off was completed without physical verification of the thread condition.",
        question: "According to Reason's Swiss Cheese Model, how many defensive layers failed in this accident? Name the specific holes in each layer.",
        options: [
          { text: "4 layers: Regulatory (FAA approval), Organizational (deferral culture), Supervisory (override), and Inspection (paper compliance)", correct: true, points: 100 },
          { text: "2 layers: Only the technician and supervisor failed", correct: false, points: 0 },
          { text: "5 layers including design flaw and pilot error", correct: false, points: 0 },
          { text: "Only the FAA regulatory layer failed", correct: false, points: 0 }
        ],
        correctAnswer: "4 layers: Regulatory, Organizational, Supervisory, and Inspection",
        explanation: "Multiple layers failed: Regulatory (approved dangerous interval), Organizational (normalized deferral), Supervisory (overrode concern), Inspection (signed off without verification).",
        wearLevel: 0.055,
        integrity: 50,
        pointsPossible: 100
      },
      {
        id: 3,
        title: "The Supervisor's Rational Choice",
        framework: "Safety Differently (Sidney Dekker)",
        scenario: "The supervisor who overrode the technician's recommendation was not acting maliciously. From his perspective, the aircraft was already late, the part wasn't available, and previous deferrals had never caused an accident.",
        question: "What does Dekker mean by 'human error is a symptom, not a cause'? Apply this to the supervisor's decision.",
        options: [
          { text: "The supervisor's decision was locally rational given the pressures, resources, and information available at the time", correct: true, points: 100 },
          { text: "The supervisor was lazy and should be fired", correct: false, points: 0 },
          { text: "Only the technician is responsible for the accident", correct: false, points: 0 },
          { text: "Human error cannot be prevented, so we should accept it", correct: false, points: 0 }
        ],
        correctAnswer: "The supervisor's decision was locally rational given the pressures, resources, and information available",
        explanation: "Dekker argues that blaming individuals hides systemic causes. The supervisor's override made sense given schedule pressure, parts unavailability, and no prior failures from deferrals.",
        wearLevel: 0.082,
        integrity: 22,
        pointsPossible: 100
      },
      {
        id: 4,
        title: "The Silent Technician",
        framework: "Psychological Safety (Amy Edmondson)",
        scenario: "The technician raised the concern once, was overruled, and did not escalate further. No safety report was filed. The organization had a history of valuing schedule compliance over safety concerns.",
        question: "Using Edmondson's framework, what does this tell us about psychological safety at Alaska Airlines?",
        options: [
          { text: "The workplace lacked psychological safety, making speaking up feel futile and potentially dangerous for career advancement", correct: true, points: 100 },
          { text: "The technician was simply afraid of the supervisor", correct: false, points: 0 },
          { text: "The organization had excellent safety culture", correct: false, points: 0 },
          { text: "Only the technician is responsible for not speaking up again", correct: false, points: 0 }
        ],
        correctAnswer: "The workplace lacked psychological safety, making speaking up feel futile and potentially dangerous",
        explanation: "Edmondson's research shows that when psychological safety is absent, people choose silence over speaking up, even about serious safety concerns.",
        wearLevel: 0.095,
        integrity: 10,
        pointsPossible: 100
      },
      {
        id: 5,
        title: "The Gap Between Paper and Reality",
        framework: "Work-as-Done (Todd Conklin)",
        scenario: "The maintenance task card was signed and certified as complete. The lubrication was documented as performed. Yet the jackscrew failed catastrophically due to inadequate lubrication over years.",
        question: "What is the gap between 'work-as-imagined' and 'work-as-done' in this accident?",
        options: [
          { text: "Work-as-imagined assumes ideal conditions; work-as-done happened under pressure, fatigue, and parts shortage", correct: true, points: 100 },
          { text: "The paperwork was forged", correct: false, points: 0 },
          { text: "The technicians were not trained properly", correct: false, points: 0 },
          { text: "There is no gap - compliance equals safety", correct: false, points: 0 }
        ],
        correctAnswer: "Work-as-imagined assumes ideal conditions; work-as-done happened under pressure, fatigue, and parts shortage",
        explanation: "Conklin teaches that work-as-imagined (the procedure) and work-as-done (reality) always differ. The signature looked the same, but the safety outcome was completely different.",
        wearLevel: 0.115,
        integrity: 0,
        pointsPossible: 100
      }
    ];
    
    // Grading thresholds (out of 500)
    const GRADING = {
      distinction: 400,
      completed: 350,
      attended: 0
    };
    
    function getGrade(score) {
      if (score >= GRADING.distinction) {
        return { name: "Completed with Distinction", class: "grade-distinction", icon: "🏆" };
      } else if (score >= GRADING.completed) {
        return { name: "Completed", class: "grade-completed", icon: "✅" };
      } else {
        return { name: "Attended", class: "grade-attended", icon: "📋" };
      }
    }
    
    function showSuccessMessage(message) {
      const div = document.createElement('div');
      div.className = 'success-message';
      div.textContent = message;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 3000);
    }
    
    let currentPlayer = null;
    let allPlayers = [];
    let currentCardIndex = 0;
    let submittedCards = [];
    let isFacilitatorMode = false;
    let sessionResponses = [];
    
    function loadPlayer() {
      const saved = localStorage.getItem('hf-current-player');
      if (!saved) {
        window.location.href = 'index.html';
        return;
      }
      currentPlayer = JSON.parse(saved);
      document.getElementById('player-name').textContent = currentPlayer.name;
      updateScoreDisplay();
    }
    
    function updateScoreDisplay() {
      const score = currentPlayer.score || 0;
      const grade = getGrade(score);
      document.getElementById('player-score').innerHTML = `Score: ${score} pts <span class="grade-badge ${grade.class}">${grade.icon} ${grade.name}</span>`;
    }
    
    function loadSessionData() {
      allPlayers = JSON.parse(localStorage.getItem('hf-participants') || '[]');
      const updatedPlayer = allPlayers.find(p => p.id === currentPlayer.id);
      if (updatedPlayer) {
        currentPlayer.score = updatedPlayer.score;
        updateScoreDisplay();
      }
      
      const saved = localStorage.getItem(`case-progress-${currentPlayer.id}`);
      if (saved) {
        const progress = JSON.parse(saved);
        submittedCards = progress.submittedCards || [];
        currentCardIndex = submittedCards.length;
      }
      
      sessionResponses = JSON.parse(localStorage.getItem('hf-session-responses') || '[]');
      
      renderScoreBar();
      renderMainContent();
    }
    
    function renderScoreBar() {
      const container = document.getElementById('score-bar');
      if (allPlayers.length === 0) {
        container.innerHTML = '<div class="score-chip">Waiting for participants...</div>';
        return;
      }
      container.innerHTML = allPlayers.map(p => {
        const grade = getGrade(p.score);
        return `
          <div class="score-chip ${p.id === currentPlayer.id ? 'active' : ''}">
            ${escapeHtml(p.name)}: ${p.score} pts
            <span class="grade-badge ${grade.class}" style="font-size: 0.55rem; margin-left: 0.3rem;">${grade.icon}</span>
          </div>
        `;
      }).join('');
    }
    
    function renderMainContent() {
      const container = document.getElementById('main-content');
      
      if (isFacilitatorMode) {
        renderFacilitatorView(container);
      } else {
        renderParticipantView(container);
      }
    }
    
    function renderParticipantView(container) {
      if (currentCardIndex >= DOSSIER_CARDS.length) {
        const finalScore = currentPlayer.score || 0;
        const grade = getGrade(finalScore);
        container.innerHTML = `
          <div class="dossier-card" style="grid-column: 1/-1;">
            <div class="complete-card">
              <div class="complete-icon">✓</div>
              <h2 style="margin-bottom: 0.5rem;">Case Study Complete!</h2>
              <p style="color: #7b8a9b; margin-bottom: 1rem;">You have completed all 5 framework questions.</p>
              <div style="background: rgba(69, 179, 255, 0.1); padding: 1rem; border-radius: 12px; margin-bottom: 1rem;">
                <div style="font-size: 1.5rem; font-weight: 700; color: #ffd166;">${finalScore} / 500 points</div>
                <div class="grade-badge ${grade.class}" style="font-size: 0.9rem; margin-top: 0.5rem;">${grade.icon} ${grade.name}</div>
              </div>
              <p style="font-size: 0.75rem; color: #7b8a9b;">The facilitator will now lead the debrief discussion.</p>
            </div>
          </div>
          <div class="sidebar-card">
            <div class="sidebar-title">📋 Completed Cards</div>
            ${DOSSIER_CARDS.map((card, idx) => `
              <div style="padding: 0.5rem; margin-bottom: 0.5rem; background: rgba(46, 196, 182, 0.1); border-radius: 8px;">
                <strong>${card.framework}</strong><br>
                <span style="font-size: 0.65rem; color: #2ec4b6;">✓ Completed</span>
              </div>
            `).join('')}
          </div>
        `;
        return;
      }
      
      const card = DOSSIER_CARDS[currentCardIndex];
      const totalCards = DOSSIER_CARDS.length;
      
      container.innerHTML = `
        <div>
          <div class="wear-card">
            <div class="wear-title">🔧 JACKSCREW ACME THREAD TELEMETRY</div>
            <div class="svg-container" id="thread-svg-container"></div>
            <div class="wear-stats">
              <div class="wear-stat">
                <div class="wear-stat-label">End-Play Measurement</div>
                <div class="wear-stat-value">${card.wearLevel.toFixed(3)} in</div>
              </div>
              <div class="wear-stat">
                <div class="wear-stat-label">Thread Integrity</div>
                <div class="wear-stat-value">${card.integrity}%</div>
                <div class="integrity-bar"><div class="integrity-fill" style="width: ${card.integrity}%; background: ${card.integrity > 60 ? '#2ec4b6' : card.integrity > 20 ? '#ffd166' : '#e63946'};"></div></div>
              </div>
            </div>
          </div>
          
          <div class="dossier-card">
            <div class="dossier-header">
              <span class="dossier-number">Question ${currentCardIndex + 1}/${totalCards}</span>
              <span class="dossier-framework">${card.framework}</span>
            </div>
            <div class="dossier-title">${card.title}</div>
            <div class="dossier-scenario">${card.scenario}</div>
            
            <div class="question-label">📝 QUESTION (${card.pointsPossible} points):</div>
            <div class="dossier-scenario" style="background: rgba(69, 179, 255, 0.1); margin-bottom: 1rem;">${card.question}</div>
            
            <div class="options-grid" id="options-grid">
              ${card.options.map((opt, idx) => `
                <label class="option-radio">
                  <input type="radio" name="answer" value="${idx}" data-points="${opt.points}" data-correct="${opt.correct}">
                  <span class="option-text">${escapeHtml(opt.text)}</span>
                </label>
              `).join('')}
            </div>
            
            <button class="btn-submit" onclick="submitResponse(${currentCardIndex})">✈️ SUBMIT RESPONSE →</button>
            <div class="scoring-info">💡 Each question worth ${card.pointsPossible} points (5 questions × 100 = 500 total points)</div>
          </div>
        </div>
        
        <div>
          <div class="sidebar-card">
            <div class="sidebar-title">📡 LIVE PARTICIPANT INSIGHTS</div>
            <div class="insight-feed" id="insight-feed">
              <div class="waiting">Waiting for participant responses...</div>
            </div>
            <div class="privacy-note">👥 All participants can see each other's progress to encourage collaborative learning</div>
          </div>
          <div class="sidebar-card">
            <div class="sidebar-title">📊 YOUR PROGRESS</div>
            <div style="margin-bottom: 0.5rem;">
              <div style="font-size: 0.7rem; color: #7b8a9b;">Questions Completed</div>
              <div style="font-size: 1.2rem; font-weight: 700;">${submittedCards.length}/${totalCards}</div>
            </div>
            <div style="margin-bottom: 0.5rem;">
              <div style="font-size: 0.7rem; color: #7b8a9b;">Current Score</div>
              <div style="font-size: 1.2rem; font-weight: 700; color: #ffd166;">${currentPlayer.score || 0} / 500 pts</div>
            </div>
            <div class="integrity-bar"><div class="integrity-fill" style="width: ${(submittedCards.length / totalCards) * 100}%; background: #45b3ff;"></div></div>
            <div class="grade-container">
              <div style="font-size: 0.6rem; color: #7b8a9b;">Grade Thresholds (500 pts max):</div>
              <div style="display: flex; justify-content: space-between; font-size: 0.6rem;">
                <span>📋 Attended: &lt;350</span>
                <span>✅ Completed: 350-399</span>
                <span>🏆 Distinction: 400+</span>
              </div>
            </div>
          </div>
        </div>
      `;
      
      renderThreadVisualizer(card);
      renderInsightFeed();
    }
    
    function renderThreadVisualizer(card) {
      const container = document.getElementById('thread-svg-container');
      if (!container) return;
      
      const wearRatio = Math.min(1, Math.max(0, card.wearLevel / 0.12));
      const nutColor = card.integrity > 60 ? '#2ec4b6' : card.integrity > 20 ? '#ffd166' : '#e63946';
      
      container.innerHTML = `
        <svg width="100%" height="100" viewBox="0 0 500 80" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="30" width="480" height="20" fill="#27272a" stroke="#52525b" stroke-width="1" />
          ${Array.from({ length: 15 }, (_, i) => {
            const x = 25 + (i * 30);
            const threadHeight = 12 * (1 - wearRatio * 0.7);
            const threadColor = wearRatio > 0.7 ? '#e63946' : wearRatio > 0.4 ? '#ffd166' : '#d4d4d8';
            return `
              <path d="M ${x} 30 L ${x + 8} ${18 + (15 - threadHeight)} L ${x + 22} ${18 + (15 - threadHeight)} L ${x + 30} 30 Z" fill="${threadColor}" stroke="#71717a" stroke-width="0.5" opacity="${1 - wearRatio * 0.5}" />
              <path d="M ${x} 50 L ${x + 8} ${62 + (15 - threadHeight)} L ${x + 22} ${62 + (15 - threadHeight)} L ${x + 30} 50 Z" fill="${threadColor}" stroke="#71717a" stroke-width="0.5" opacity="${1 - wearRatio * 0.5}" />
            `;
          }).join('')}
          <g transform="translate(200, 15)">
            <rect x="0" y="0" width="100" height="50" fill="rgba(69, 179, 255, 0.05)" stroke="${nutColor}" stroke-width="2" rx="4" />
            <text x="50" y="28" fill="${nutColor}" font-size="9" font-family="monospace" text-anchor="middle">ACME NUT</text>
            ${card.integrity === 0 ? '<text x="50" y="42" fill="#e63946" font-size="7" text-anchor="middle">STRIPPED</text>' : ''}
          </g>
        </svg>
      `;
    }
    
    function renderInsightFeed() {
      const container = document.getElementById('insight-feed');
      if (!container) return;
      
      const recentInsights = [...sessionResponses].reverse().slice(0, 8);
      
      if (recentInsights.length === 0) {
        container.innerHTML = '<div class="waiting">No responses yet. Submit your first answer to share with the group.</div>';
        return;
      }
      
      container.innerHTML = recentInsights.map(insight => {
        const grade = getGrade(insight.totalScore);
        return `
          <div class="insight-item">
            <div class="insight-name">${escapeHtml(insight.playerName)} • ${insight.cardFramework}</div>
            <div class="insight-text">Question ${insight.cardId}: ${insight.isCorrect ? '✓ Correct' : '✗ Incorrect'}</div>
            <div class="insight-factors">
              <span class="insight-factor">Score: ${insight.pointsEarned}/${insight.pointsPossible} pts</span>
              <span class="insight-factor" style="background: rgba(255, 209, 102, 0.15); color: #ffd166;">Total: ${insight.totalScore} pts ${grade.icon}</span>
            </div>
            ${!insight.isCorrect ? `<div class="correct-answer">📌 Correct answer: ${insight.correctAnswerText}</div>` : ''}
          </div>
        `;
      }).join('');
    }
    
    function renderFacilitatorView(container) {
      const frameworkStats = {};
      DOSSIER_CARDS.forEach(card => {
        frameworkStats[card.framework] = { total: 0, correct: 0, fullName: card.framework };
      });
      
      sessionResponses.forEach(resp => {
        if (frameworkStats[resp.cardFramework]) {
          frameworkStats[resp.cardFramework].total++;
          if (resp.isCorrect) frameworkStats[resp.cardFramework].correct++;
        }
      });
      
      const participantResults = [];
      allPlayers.forEach(p => {
        const playerResponses = sessionResponses.filter(r => r.playerId === p.id);
        const totalScore = playerResponses.reduce((sum, r) => sum + r.pointsEarned, 0);
        const grade = getGrade(totalScore);
        participantResults.push({ name: p.name, score: totalScore, grade, responses: playerResponses.length });
      });
      participantResults.sort((a, b) => b.score - a.score);
      
      container.innerHTML = `
        <div style="grid-column: 1/-1;">
          <div class="dossier-card">
            <div class="dossier-header">
              <span class="dossier-number">📊 FACILITATOR ANALYTICS DASHBOARD</span>
              <span class="dossier-framework">500 Points | 5 Frameworks</span>
            </div>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1rem;">
              <div>
                <h4 style="margin-bottom: 0.75rem;">🎯 Framework Performance</h4>
                <div class="analytics-chart">
                  ${Object.entries(frameworkStats).map(([framework, stats]) => {
                    const percentage = stats.total > 0 ? (stats.correct / stats.total) * 100 : 0;
                    return `
                      <div class="chart-bar">
                        <span class="chart-bar-label">${escapeHtml(framework)}</span>
                        <div style="flex: 1; min-width: 100px;"><div class="chart-bar-fill" style="width: ${percentage}%; background: ${percentage >= 80 ? '#2ec4b6' : percentage >= 60 ? '#ffd166' : '#e63946'};"></div></div>
                        <span style="width: 40px; text-align: right;">${stats.correct}/${stats.total}</span>
                      </div>
                    `;
                  }).join('')}
                </div>
              </div>
              
              <div>
                <h4 style="margin-bottom: 0.75rem;">👥 Participant Results (500 pts max)</h4>
                <div class="analytics-chart">
                  ${participantResults.map(p => `
                    <div class="chart-bar">
                      <span class="chart-bar-label">${escapeHtml(p.name.substring(0, 20))}</span>
                      <div style="flex: 1; min-width: 100px;"><div class="chart-bar-fill" style="width: ${(p.score / 500) * 100}%; background: ${p.grade.class === 'grade-distinction' ? '#2ec4b6' : p.grade.class === 'grade-completed' ? '#45b3ff' : '#e63946'};"></div></div>
                      <span style="width: 60px; text-align: right;">${p.score} pts</span>
                      <span class="grade-badge ${p.grade.class}" style="font-size: 0.6rem;">${p.grade.icon}</span>
                    </div>
                  `).join('')}
                  ${participantResults.length === 0 ? '<div class="waiting">No participants have joined yet</div>' : ''}
                </div>
              </div>
            </div>
            
            <div style="margin-top: 1.5rem;">
              <h4 style="margin-bottom: 0.75rem;">📝 All Participant Responses (With Correct Answers)</h4>
              <div style="max-height: 400px; overflow-y: auto;">
                ${sessionResponses.length === 0 ? '<div class="waiting">No responses submitted yet</div>' : ''}
                ${sessionResponses.map(resp => {
                  const card = DOSSIER_CARDS.find(c => c.id === resp.cardId);
                  return `
                    <div class="insight-item" style="margin-bottom: 0.75rem;">
                      <div class="insight-name">${escapeHtml(resp.playerName)} • ${resp.cardFramework}</div>
                      <div class="insight-text">📝 <strong>Their answer:</strong> ${escapeHtml(resp.selectedAnswer)}</div>
                      <div class="insight-factors">
                        <span class="insight-factor">${resp.isCorrect ? '✓ Correct' : '✗ Incorrect'}</span>
                        <span class="insight-factor">${resp.pointsEarned}/${resp.pointsPossible} pts</span>
                      </div>
                      ${!resp.isCorrect && card ? `<div class="correct-answer" style="background: rgba(69, 179, 255, 0.1); padding: 0.3rem; margin-top: 0.3rem; border-radius: 8px;">📌 <strong>Correct answer:</strong> ${card.correctAnswer}</div>` : ''}
                      ${!resp.isCorrect && card ? `<div style="font-size: 0.65rem; color: #7b8a9b; margin-top: 0.3rem;">📖 ${card.explanation}</div>` : ''}
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
            
            <div style="margin-top: 1.5rem; display: flex; gap: 0.75rem; flex-wrap: wrap;">
              <button onclick="resetAllProgress()" style="background: rgba(230, 57, 70, 0.2); border: 1px solid rgba(230, 57, 70, 0.3); color: #e63946; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer;">🔄 Reset All Progress</button>
              <button onclick="clearAllResponses()" style="background: rgba(230, 57, 70, 0.2); border: 1px solid rgba(230, 57, 70, 0.3); color: #e63946; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer;">🗑️ Clear All Responses</button>
            </div>
          </div>
        </div>
      `;
    }
    
    async function submitResponse(cardIndex) {
      const card = DOSSIER_CARDS[cardIndex];
      
      const selectedRadio = document.querySelector('input[name="answer"]:checked');
      if (!selectedRadio) {
        showSuccessMessage('⚠️ Please select an answer before submitting');
        return;
      }
      
      const selectedIndex = parseInt(selectedRadio.value);
      const selectedOption = card.options[selectedIndex];
      const isCorrect = selectedOption.correct;
      const pointsEarned = isCorrect ? card.pointsPossible : 0;
      
      currentPlayer.score = (currentPlayer.score || 0) + pointsEarned;
      
      const playerIndex = allPlayers.findIndex(p => p.id === currentPlayer.id);
      if (playerIndex !== -1) {
        allPlayers[playerIndex].score = currentPlayer.score;
        localStorage.setItem('hf-participants', JSON.stringify(allPlayers));
      }
      
      submittedCards.push({
        cardId: card.id,
        cardTitle: card.title,
        cardFramework: card.framework,
        selectedAnswer: selectedOption.text,
        isCorrect: isCorrect,
        pointsEarned: pointsEarned,
        pointsPossible: card.pointsPossible
      });
      
      localStorage.setItem(`case-progress-${currentPlayer.id}`, JSON.stringify({
        submittedCards: submittedCards,
        completedAt: new Date().toISOString()
      }));
      
      sessionResponses.push({
        playerId: currentPlayer.id,
        playerName: currentPlayer.name,
        cardId: card.id,
        cardTitle: card.title,
        cardFramework: card.framework,
        selectedAnswer: selectedOption.text,
        isCorrect: isCorrect,
        pointsEarned: pointsEarned,
        pointsPossible: card.pointsPossible,
        correctAnswerText: card.correctAnswer,
        totalScore: currentPlayer.score,
        timestamp: new Date().toISOString()
      });
      localStorage.setItem('hf-session-responses', JSON.stringify(sessionResponses));
      
      updateScoreDisplay();
      currentCardIndex++;
      renderMainContent();
      
      if (isCorrect) {
        showSuccessMessage(`✓ Correct! +${pointsEarned} points`);
      } else {
        showSuccessMessage(`✗ Incorrect. The correct answer is: ${card.correctAnswer}`);
      }
    }
    
    function toggleMode() {
      isFacilitatorMode = !isFacilitatorMode;
      const btn = document.getElementById('mode-toggle-btn');
      const body = document.getElementById('app-body');
      
      if (isFacilitatorMode) {
        btn.textContent = '👥 Participant Mode';
        body.classList.add('facilitator');
      } else {
        btn.textContent = '👨‍🏫 Facilitator Mode';
        body.classList.remove('facilitator');
      }
      
      renderMainContent();
    }
    
    function resetAllProgress() {
      if (confirm('⚠️ Reset all participant progress? This will clear all scores and submissions.')) {
        const keys = Object.keys(localStorage);
        keys.forEach(key => {
          if (key.startsWith('case-progress-')) {
            localStorage.removeItem(key);
          }
        });
        localStorage.removeItem('hf-session-responses');
        
        currentPlayer.score = 0;
        const playerIndex = allPlayers.findIndex(p => p.id === currentPlayer.id);
        if (playerIndex !== -1) {
          allPlayers[playerIndex].score = 0;
          localStorage.setItem('hf-participants', JSON.stringify(allPlayers));
        }
        
        submittedCards = [];
        currentCardIndex = 0;
        sessionResponses = [];
        
        updateScoreDisplay();
        renderMainContent();
        showSuccessMessage('Session reset complete');
      }
    }
    
    function clearAllResponses() {
      if (confirm('⚠️ Clear all participant responses? This cannot be undone.')) {
        localStorage.removeItem('hf-session-responses');
        sessionResponses = [];
        renderMainContent();
        showSuccessMessage('All responses cleared');
      }
    }
    
    function exitToJoin() {
      if (confirm('Exit this session? Your progress will be saved.')) {
        window.location.href = 'index.html';
      }
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    function refreshData() {
      const updatedPlayers = JSON.parse(localStorage.getItem('hf-participants') || '[]');
      const updatedPlayer = updatedPlayers.find(p => p.id === currentPlayer.id);
      if (updatedPlayer && updatedPlayer.score !== currentPlayer.score) {
        currentPlayer.score = updatedPlayer.score;
        updateScoreDisplay();
      }
      
      const updatedResponses = JSON.parse(localStorage.getItem('hf-session-responses') || '[]');
      if (JSON.stringify(sessionResponses) !== JSON.stringify(updatedResponses)) {
        sessionResponses = updatedResponses;
        if (!isFacilitatorMode) {
          renderInsightFeed();
        } else {
          renderMainContent();
        }
      }
      
      const updatedAllPlayers = JSON.parse(localStorage.getItem('hf-participants') || '[]');
      if (JSON.stringify(allPlayers) !== JSON.stringify(updatedAllPlayers)) {
        allPlayers = updatedAllPlayers;
        renderScoreBar();
        if (isFacilitatorMode) {
          renderMainContent();
        }
      }
    }
    
    loadPlayer();
    loadSessionData();
    setInterval(refreshData, 3000);
  </script>
</body>
</html>
