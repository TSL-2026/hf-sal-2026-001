<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Generator - HF Case Studio</title>
<style>
  body {
    font-family: monospace;
    background: #0a0a0a;
    color: #d8dce8;
    padding: 2rem;
    text-align: center;
  }
  canvas { margin: 1rem; border: 1px solid #333; }
  button {
    background: #e63946;
    color: white;
    border: none;
    padding: 0.5rem 1rem;
    cursor: pointer;
    margin: 0.5rem;
  }
  .icon-grid { display: flex; flex-wrap: wrap; justify-content: center; }
</style>
</head>
<body>
<h1>HF Case Studio - PWA Icon Generator</h1>
<p>Generate icons for PWA installation from emoji or text</p>

<div>
  <input type="text" id="icon-text" value="📚" style="font-size:2rem; padding:0.5rem; width:100px; text-align:center;">
  <button onclick="generateIcons()">Generate Icons</button>
  <button onclick="downloadAll()">Download All Icons</button>
</div>

<div id="icons" class="icon-grid"></div>

<script>
const sizes = [72, 96, 128, 144, 152, 192, 384, 512];

function generateIcon(size, text) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  
  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#e63946');
  grad.addColorStop(1, '#c1121f');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  
  // Border
  ctx.strokeStyle = '#ffd166';
  ctx.lineWidth = size * 0.03;
  ctx.strokeRect(size * 0.05, size * 0.05, size * 0.9, size * 0.9);
  
  // Text/Emoji
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${size * 0.4}px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, size / 2, size / 2);
  
  // Small badge
  ctx.font = `${size * 0.12}px monospace`;
  ctx.fillStyle = '#ffd166';
  ctx.fillText('HF', size * 0.85, size * 0.9);
  
  return canvas;
}

function generateIcons() {
  const text = document.getElementById('icon-text').value || '📚';
  const container = document.getElementById('icons');
  container.innerHTML = '';
  
  sizes.forEach(size => {
    const canvas = generateIcon(size, text);
    container.appendChild(canvas);
    
    // Store for download
    canvas.id = `icon-${size}`;
  });
}

function downloadAll() {
  sizes.forEach(size => {
    const canvas = document.getElementById(`icon-${size}`);
    if (canvas) {
      const link = document.createElement('a');
      link.download = `icon-${size}.png`;
      link.href = canvas.toDataURL();
      link.click();
    }
  });
}

// Generate on load
generateIcons();
</script>
</body>
</html>
